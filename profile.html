<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Private Offer Share</title>
<meta name="description" content="আপনার প্রোফাইল ও অর্ডার হিস্ট্রি দেখুন">
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
  .profile-container { max-width: 700px; margin: 2rem auto; padding: 0 1.25rem; }
  .profile-header { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
  .profile-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--bg-soft); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
  .profile-info h2 { font-size: 1.2rem; font-weight: 700; }
  .profile-info p { color: var(--text-muted); font-size: 0.88rem; }
  .order-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; margin-bottom: 0.8rem; }
  .order-card .order-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.5rem; }
  .order-card .order-status { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; }
  .order-card .order-detail { color: var(--text-muted); font-size: 0.85rem; }
  .status-pending { background: rgba(59,130,246,.18); color: #3B82F6; }
  .status-confirmed { background: rgba(16,185,129,.18); color: #10B981; }
  .status-delivered { background: rgba(16,185,129,.18); color: #10B981; }
  .status-cancelled { background: rgba(239,68,68,.18); color: #EF4444; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
  .logout-section { margin-top: 2rem; text-align: center; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .back-link { display: inline-block; margin: 1rem 0; color: var(--accent); font-weight: 600; }
  @media (max-width: 480px) { .profile-header { flex-direction: column; text-align: center; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-top-row">
      <a href="index.html" class="logo">
        <img src="assets/images/logo.png" alt="Private Offer Share" class="logo-img" width="40" height="40">
        <span class="logo-text">Private Offer <em>Share</em></span>
      </a>
      <div class="header-actions">
        <button class="icon-btn" id="themeToggleBtn" title="Dark/Light Mode">🌙</button>
        <a href="index.html" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> হোম</a>
      </div>
    </div>
  </div>
</header>

<main class="profile-container" id="profileContent">
  <div class="skeleton" style="height:100px;margin-bottom:1rem;border-radius:var(--radius);"></div>
  <div class="skeleton" style="height:80px;margin-bottom:0.5rem;border-radius:var(--radius);"></div>
  <div class="skeleton" style="height:80px;margin-bottom:0.5rem;border-radius:var(--radius);"></div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div>© <span id="year"></span> Private Offer Share</div>
    <div><a href="privacy.html">Privacy</a> | <a href="terms.html">Terms</a> | <a href="contact.html">Contact</a></div>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script>
  // Theme
  document.getElementById('year').textContent = new Date().getFullYear();
  var saved = localStorage.getItem("dn_theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", saved);
  document.getElementById('themeToggleBtn').textContent = saved === "dark" ? "☀️" : "🌙";
  document.getElementById('themeToggleBtn').addEventListener('click', function() {
    var cur = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
    var next = cur === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("dn_theme", next);
    this.textContent = next === "dark" ? "☀️" : "🌙";
  });

  // Auth check
  auth.onAuthStateChanged(async function(user) {
    if (!user) {
      document.getElementById('profileContent').innerHTML = `
        <div class="empty-state">
          <i class="fas fa-user-lock" style="font-size:4rem;display:block;margin-bottom:1rem;color:var(--text-muted);"></i>
          <h2>আগে Login করুন</h2>
          <p style="color:var(--text-muted);margin-bottom:1.5rem;">প্রোফাইল দেখতে হলে অবশ্যই Login করতে হবে।</p>
          <a href="index.html" class="btn btn-primary">🏠 হোমে ফিরুন</a>
        </div>`;
      return;
    }
    loadProfile(user);
  });

  async function loadProfile(user) {
    try {
      var userDoc = await db.collection("users").doc(user.uid).get();
      var userData = userDoc.exists ? userDoc.data() : {};
      
      var ordersSnap = await db.collection("codOrders")
        .where("userId", "==", user.uid)
        .orderBy("createdAt", "desc")
        .limit(20)
        .get();
      
      var orders = ordersSnap.docs.map(function(d) { return { id: d.id, ...d.data() }; });
      renderProfile(user, userData, orders);
    } catch (e) {
      console.error(e);
      document.getElementById('profileContent').innerHTML = '<div class="empty-state">ডাটা লোড করতে সমস্যা হয়েছে।</div>';
    }
  }

  function escapeHTML(str) {
    var div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function renderProfile(user, userData, orders) {
    var name = userData.name || user.displayName || (user.email ? user.email.split('@')[0] : 'User');
    var email = userData.email || user.email || 'N/A';
    var phone = userData.phone || 'N/A';
    var loginMethod = userData.loginMethod === 'phone' ? 'ফোন নম্বর' : 'ইমেইল';
    var joinedDate = userData.createdAt && userData.createdAt.toDate ? userData.createdAt.toDate().toLocaleDateString("bn-BD") : 'N/A';
    
    var ordersHTML = '';
    if (orders.length === 0) {
      ordersHTML = '<div class="empty-state"><i class="fas fa-box-open" style="font-size:2.5rem;display:block;margin-bottom:0.5rem;"></i>এখনো কোনো অর্ডার নেই</div>';
    } else {
      ordersHTML = orders.map(function(o) {
        var date = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate().toLocaleDateString("bn-BD") : "—";
        var statusClass = { pending: 'status-pending', confirmed: 'status-confirmed', delivered: 'status-delivered', cancelled: 'status-cancelled' }[o.status] || '';
        var statusLabel = { pending: '⏳ Pending', confirmed: '✅ Confirmed', delivered: '📦 Delivered', cancelled: '❌ Cancelled' }[o.status] || o.status;
        return '<div class="order-card">' +
          '<div class="order-header"><strong>' + escapeHTML(o.productName || '—') + '</strong><span class="order-status ' + statusClass + '">' + statusLabel + '</span></div>' +
          '<div class="order-detail">দাম: ' + (o.productPrice || '—') + ' | পরিমাণ: ' + (o.quantity || 1) + ' | তারিখ: ' + date + '</div>' +
        '</div>';
      }).join('');
    }

    document.getElementById('profileContent').innerHTML = `
      <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> হোমে ফিরুন</a>
      
      <div class="profile-header">
        <div class="profile-avatar"><i class="fas fa-user"></i></div>
        <div class="profile-info">
          <h2>${escapeHTML(name)}</h2>
          <p><i class="fas fa-envelope"></i> ${escapeHTML(email)}</p>
          <p><i class="fas fa-phone"></i> ${escapeHTML(phone)}</p>
          <p style="font-size:0.78rem;margin-top:0.3rem;">Login: ${loginMethod} | Joined: ${joinedDate}</p>
        </div>
      </div>
      
      <h2 style="font-family:var(--font-display);margin-bottom:1rem;">📦 আপনার অর্ডার সমূহ (${orders.length})</h2>
      ${ordersHTML}
      
      <div class="logout-section">
        <p style="color:var(--text-muted);margin-bottom:0.8rem;font-size:0.88rem;">আপনি লগইন করা আছেন</p>
        <button class="btn btn-danger" onclick="auth.signOut(); window.location.href='index.html';" style="padding:0.7rem 2rem;">
          <i class="fas fa-sign-out-alt"></i> লগআউট
        </button>
      </div>
    `;
  }
</script>
</body>
</html>
